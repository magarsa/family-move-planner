name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Type-check + build ──────────────────────────────────────────────
  ci:
    name: CI (type check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Job 2: Database migrations (only if CI passes) ────────────────────────
  migrate:
    name: Database migrations
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations
        run: psql "${{ secrets.DATABASE_URL }}" < supabase/migration.sql
        env:
          PGSSLMODE: require

  # ── Job 3: Deploy (only if CI + migrations pass) ──────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci, migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment (incl. VITE_SUPABASE_* vars)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy prebuilt artifact
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
